name: MoneyRadar Watchdog
on:
  schedule:
    - cron: '*/2 * * * *'   # жҜҸ 2 еҲҶйҗҳ
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Health probes
        id: probe
        continue-on-error: true
        run: |
          set +e
          fail=0
          for url in \
            "https://thinkbigtw.com/lab/" \
            "https://thinkbigtw.com/lab/app2.js" \
            "https://moneyradar-ai-proxy.thinkbigtw.workers.dev/health"
          do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$code" != "200" ]; then
              echo "вқҢ $url вҶ’ HTTP $code"
              fail=$((fail+1))
            fi
          done
          # /quote жҠҪжЁЈ
          q=$(curl -s 'https://moneyradar-ai-proxy.thinkbigtw.workers.dev/quote?symbol=NVDA')
          if ! echo "$q" | grep -q '"price"'; then
            echo "вқҢ /quote NVDA еӨұж•—"
            fail=$((fail+1))
          fi
          echo "fail_count=$fail" >> $GITHUB_OUTPUT
          exit 0
      - name: Open incident on failure
        if: steps.probe.outputs.fail_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fc = '${{ steps.probe.outputs.fail_count }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'рҹҡЁ Watchdog еҒөжё¬з•°еёё ' + new Date().toISOString() + ' (failed: ' + fc + ')',
              body: 'зӣЈжё¬пјҡ' + new Date().toISOString() + '\\nеӨұж•—з«Ҝй»һпјҡ' + fc + ' еҖӢ\\n\\n' +
                    'рҹ”Қ [жҹҘзңӢ Workflow Run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')\\n\\n' +
                    'е»әиӯ°жӘўжҹҘпјҡ1) Cloudflare Worker зӢҖж…Ӣ 2) GitHub Pages йғЁзҪІ 3) Yahoo Finance API',
              labels: ['watchdog', 'incident', 'auto-detected']
            });
